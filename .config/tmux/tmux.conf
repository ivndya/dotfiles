set -sg default-terminal "tmux-256color"
# sync — синхронизированный вывод (DEC 2026): tmux перерисовывает кадр атомарно,
# иначе на каждой перерисовке курсор прячется/показывается и заметно «моргает».
set -as terminal-features ",xterm-256color:RGB:sync"
set -g mouse on
set-option -g status-position bottom
set -g set-clipboard on
set -sg escape-time 0

unbind C-b
bind C-f send-prefix
set -g prefix C-f
unbind r

bind r source-file ~/.config/tmux/tmux.conf

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Имя окна = базовое имя текущей директории (показывается во вкладках Dracula как #W)
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Переключение окон без префикса: Alt+цифра (раскладко-независимо —
# цифры одинаковы в QWERTY и ЙЦУКЕН, дубли не нужны)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# sesh: fzf-переключалка сессий (tmux-сессии + zoxide-директории)
bind T run-shell "sesh connect \"$(sesh list --icons | fzf-tmux -p 80%,70% --no-sort --ansi --prompt '⚡ ')\""

# Плагин переименовывал окна в иконку+программу — отключён, чтобы во вкладках была директория
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux' 

set -g @dracula-show-powerline true
set -g @dracula-transparent-powerline-bg true

set -g @dracula-inverse-divider 
set -g @dracula-show-left-icon "#h | #S"
set -g @dracula-show-location false

# Сохранение/восстановление сессий (переживает перезапуск WSL).
# continuum должен грузиться ПОСЛЕ темы (dracula). Ручной сейв: prefix C-s,
# восстановление: prefix C-r (или само при @continuum-restore on).
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

bind "'" split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

# ── Дубли биндов для русской раскладки (та же клавиша в ЙЦУКЕН) ──
# Свои бинды
bind к source-file ~/.config/tmux/tmux.conf                # r
bind р select-pane -L                                      # h
bind о select-pane -D                                      # j
bind л select-pane -U                                      # k
bind д select-pane -R                                      # l
bind э split-window -v -c "#{pane_current_path}"           # '
bind с new-window -c "#{pane_current_path}"                # c
bind м split-window -h -c "#{pane_current_path}"           # v
bind ч kill-pane                                           # x
bind Е run-shell "sesh connect \"$(sesh list --icons | fzf-tmux -p 80%,70% --no-sort --ansi --prompt '⚡ ')\"" # T
# Дефолтные команды tmux
bind в detach-client                                       # d
bind я resize-pane -Z                                      # z
bind т next-window                                         # n
bind з previous-window                                     # p
bind ц choose-tree -Zw                                     # w
bind ы choose-tree -Zs                                     # s
bind х copy-mode                                           # [
bind ъ paste-buffer -p                                     # ]
bind б command-prompt -I "#W" "rename-window -- '%%'"      # ,
bind й display-panes                                       # q
# Copy-mode (vi)
bind-key -T copy-mode-vi м send-keys -X begin-selection               # v
bind-key -T copy-mode-vi н send-keys -X copy-pipe-and-cancel "wl-copy" # y
bind-key -T copy-mode-vi р send-keys -X cursor-left                   # h
bind-key -T copy-mode-vi о send-keys -X cursor-down                   # j
bind-key -T copy-mode-vi л send-keys -X cursor-up                     # k
bind-key -T copy-mode-vi д send-keys -X cursor-right                  # l
bind-key -T copy-mode-vi й send-keys -X cancel                        # q
# bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
# bind-key -r j run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 0"
# bind-key -r k run-shell "tmux neww ~/.local/bin/tmux-sessionizer -s 1"
# bind-key -r h run-shell "tmux switch-client -p"
# bind-key -r l run-shell "tmux switch-client -n"

run '~/.config/tmux/plugins/tpm/tpm'
# Правая часть статуса визуально пустая, но триггер автосейва continuum обязан
# жить в status-right — голый "" убивал бы периодическое сохранение.
set -g status-right "#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"

# Левая плашка Dracula (#h | #S) убрана: машина одна, сессия всегда default —
# информации ноль. Вместо неё индикатор префикса: плашка как у вкладок
# (#44475a) со значком клавиатуры (Nerd Font U+F11C) по центру; при нажатом
# префиксе плашка желтеет. Эмодзи ⌨️ не годится: рендерится квадратами.
set -g status-left "#{?client_prefix,#[fg=#282a36]#[bg=#f1fa8c],#[fg=#f8f8f2]#[bg=#44475a]}  #[fg=default]#[bg=default]"

# Границы панелей: Dracula красит неактивные в #44475a (сливается с фоном).
# Оверрайд ПОСЛЕ tpm: неактивные — видимый comment-серый, активная — фиолетовый.
set -g pane-border-style "fg=#6272a4"
set -g pane-active-border-style "fg=#bd93f9"

# ── Подсветка окна по состоянию агентских CLI ────────────────────
# Флаг @claude_alert ставят хуки Claude (~/.claude/hooks/) через agent-alert.sh:
#   work → зелёный 🤖 (выполняет ход, watchdog-start.sh; ставится безусловно)
#   wait → жёлтый ❓ (ждёт ответа/разрешения, notify-input.sh)
#   done → оранжевый 🔔 (завершил работу, notify-stop.sh)
#   bg   → оранжевый 🔄 (ход завершён, фоновые задачи ещё бегут, notify-stop.sh)
#   hang → фиолетовый ⏳ (завис: тишина >5 мин, watchdog.sh)
#   error → красный ⚠️ (ход прерван ошибкой API, notify-error.sh)
# work и bg — длящиеся состояния (агент/фоновые агенты работают): ставятся
# безусловно и НЕ снимаются при переключении на окно — их снимают notify-хуки
# по концу хода (финальный Stop без background_tasks → done). Остальные —
# события: ставятся только когда окно не на виду, снимаются при переключении
# на окно. ПОСЛЕ `run tpm`, чтобы перебить Dracula.
# Плюс независимый бейдж @claude_shells (N ≥ 1) — « 🐚N» внутри плашки вкладки
# (в серой — голубой, в алертных — цветом текста): сколько фоновых shell-задач
# Claude бежит. Ставит agent-shells.sh:
# инкремент — shells-up.sh (PostToolUse Bash, run_in_background), авторитетный
# пересчёт — notify-stop.sh на каждом Stop (type=shell в background_tasks),
# чистка — SessionEnd. session-window-changed бейдж не трогает (длящееся
# состояние); рисуется и на активной вкладке (см. window-status-current-format).
set -g window-status-format "#{?@claude_alert,#{?#{==:#{@claude_alert},wait},#[fg=#f1fa8c]#[bg=default]▐#[fg=#282a36]#[bg=#f1fa8c] ❓ #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default],#{?#{==:#{@claude_alert},work},#[fg=#50fa7b]#[bg=default]▐#[fg=#282a36]#[bg=#50fa7b] 🤖 #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default],#{?#{==:#{@claude_alert},hang},#[fg=#bd93f9]#[bg=default]▐#[fg=#282a36]#[bg=#bd93f9] ⏳ #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default],#{?#{==:#{@claude_alert},error},#[fg=#ff5555]#[bg=default]▐#[fg=#282a36]#[bg=#ff5555] ⚠️ #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default],#{?#{==:#{@claude_alert},bg},#[fg=#ffb86c]#[bg=default]▐#[fg=#282a36]#[bg=#ffb86c] 🔄 #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default],#[fg=#ffb86c]#[bg=default]▐#[fg=#282a36]#[bg=#ffb86c] 🔔 #I) #W#{?@claude_shells, 🐚#{@claude_shells},} #[bg=default]}}}}},#[fg=#44475a]#[bg=default]▐#[fg=#f8f8f2]#[bg=#44475a] #I) #W#{?@claude_shells, #[fg=#8be9fd]🐚#{@claude_shells},} #[bg=default]}"
# Активная вкладка — прямоугольник без powerline-стрелок (перебивает Dracula).
# Зазор между вкладками — полколонки: separator "", левый край каждой плашки —
# полублок ▐ (левая половина тёмная = зазор, правая — цвет плашки).
# Длящиеся состояния (work 🤖 / bg 🔄) рисуем и на активной вкладке — агент
# продолжает работать и когда окно на виду. Другие значения тут невозможны:
# события (done/wait/hang/error) при активном окне agent-alert.sh не ставит,
# а оставшиеся с неактивных времён снимает хук session-window-changed.
set -g window-status-separator ""
set -g window-status-current-format "#[fg=#6272a4]#[bg=default]▐#[fg=#f8f8f2]#[bg=#6272a4] #{?#{==:#{@claude_alert},work},🤖 ,}#{?#{==:#{@claude_alert},bg},🔄 ,}#I) #W#{?@claude_shells, #[fg=#8be9fd]🐚#{@claude_shells},} #[bg=default]"
# Снятие метки при взгляде на окно: session-window-changed (а не after-select-window)
# ловит ЛЮБОЙ способ смены текущего окна (select/next/prev, колесо по статус-бару,
# choose-tree, switch-client). Заодно ставит @claude_seen «окно смотрели»: его
# читает notify-input.sh, чтобы idle_prompt через минуту простоя не перезажигал
# 🔔 на уже прочитанном ответе (баг 2026-07-15); снимает watchdog-start.sh на
# старте нового хода.
# -g (не -ga): хук больше никем не занят, replace идемпотентен при `prefix r`.
set-hook -g session-window-changed "if -F '#{&&:#{!=:#{@claude_alert},work},#{!=:#{@claude_alert},bg}}' 'set -uw @claude_alert' ; set -w @claude_seen 1"
