# Dracula theme for Alacritty
# https://draculatheme.com/alacritty
#
# Color palette
# https://spec.draculatheme.com
#
# Instructions
# https://github.com/alacritty/alacritty/blob/master/extra/man/alacritty.5.scd

[colors.primary]

background = "#282a36"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]

text = "#282a36"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]

text = "CellBackground"
cursor = "CellForeground"

[colors.selection]

text = "CellForeground"
background = "#44475a"

[colors.normal]

black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

[colors.bright]

black = "#6272a4"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"

[colors.search.matches]

foreground = "#44475a"
background = "#50fa7b"

[colors.search.focused_match]

foreground = "#44475a"
background = "#ffb86c"

[colors.footer_bar]

background = "#282a36"
foreground = "#f8f8f2"

[colors.hints.start]

foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.end]

foreground = "#f1fa8c"
background = "#282a36"


# «Never» — курсор не мигает и приложения не могут включить мигание
# escape-последовательностью (DECSCUSR); дефолтный «Off» это разрешает.
[cursor]
style = { shape = "Block", blinking = "Never" }

[window]
dimensions = { columns = 100, lines = 40 }
dynamic_padding = true
decorations = "None"
opacity = 1.0
blur = true
startup_mode = "Maximized"
title = "Alacritty"
dynamic_title = false
decorations_theme_variant = "Dark"
resize_increments = false
level = "Normal"

[scrolling]
history = 20000
multiplier = 3

[font]
normal.family = "JetBrainsMono Nerd Font Mono"
bold.family = "JetBrainsMono Nerd Font Mono"
italic.family = "JetBrainsMono Nerd Font Mono"
bold_italic.family = "JetBrainsMono Nerd Font Mono"
size = 13
offset = { x = 0, y = 0 }

[terminal]
shell = { program = "wsl.exe", args = ["-d", "Ubuntu", "--cd", "~"] }

[env]
LANG = "C.UTF-8"
LC_ALL = "C.UTF-8"

[selection]
save_to_clipboard = true

# ── Alt+цифра → ESC+цифра (для tmux select-window) ──────────────
# При русской раскладке Alacritty на Windows не синтезирует ESC-префикс
# для Alt+клавиша автоматически — задаём последовательности явно.
# Логическая клавиша "1".."9" одна и та же в QWERTY и ЙЦУКЕН.
[keyboard]
bindings = [
  # Shift+Insert по умолчанию = PasteSelection (внутренний буфер выделения
  # Alacritty), который при tmux mouse on не обновляется — вставлялся залипший
  # мусор. Привязываем к системному буферу обмена, как в других терминалах.
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "1", mods = "Alt", chars = "\u001b1" },
  { key = "2", mods = "Alt", chars = "\u001b2" },
  { key = "3", mods = "Alt", chars = "\u001b3" },
  { key = "4", mods = "Alt", chars = "\u001b4" },
  { key = "5", mods = "Alt", chars = "\u001b5" },
  { key = "6", mods = "Alt", chars = "\u001b6" },
  { key = "7", mods = "Alt", chars = "\u001b7" },
  { key = "8", mods = "Alt", chars = "\u001b8" },
  { key = "9", mods = "Alt", chars = "\u001b9" },
]